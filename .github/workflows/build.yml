name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build Opus (debug)
        run: bash build_opus.sh

      - name: Build app (unsigned / for sideload)
        env:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGN_STYLE: Manual
        run: |
          xcodebuild -project XiaozhiAI.xcodeproj \
            -scheme XiaozhiAI \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package IPA (unsigned)
        run: |
          APP_PATH=$(find build/Build/Products/Release-iphoneos -name "XiaozhiAI.app" | head -n1)
          echo "APP_PATH=$APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r XiaozhiAI.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XiaozhiAI-unsigned
          path: XiaozhiAI.ipa
